name: Weekly PMDA Update

on:
  schedule:
    - cron: "0 17 * * 6"
  workflow_dispatch:
    inputs:
      group:
        description: "取得グループ (hira/kata/alpha/clean)"
        required: false
        default: "hira"
        type: choice
        options: ["hira","kata","alpha","clean"]

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Chrome インストール
        run: |
          wget -q -O - https://dl.google.com/linux/linux_signing_key.pub | sudo apt-key add -
          sudo sh -c 'echo "deb [arch=amd64] http://dl.google.com/linux/chrome/deb/ stable main" >> /etc/apt/sources.list.d/google-chrome.list'
          sudo apt-get update -q && sudo apt-get install -y google-chrome-stable

      - name: 依存インストール
        run: pip install selenium webdriver-manager

      - name: git 設定（スクレイピング前）
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: ゴミデータ除去
        if: ${{ github.event.inputs.group == 'clean' }}
        run: |
          python3 -c "
          import json, re
          from pathlib import Path
          p = Path('scraper/medicines.json')
          d = json.loads(p.read_text())
          meds = d.get('medicines', [])
          before = len(meds)
          clean = [m for m in meds if (
              m.get('name','') and
              len(m.get('name','')) >= 2 and
              not re.match(r'^PDF\s*[(\(]', m.get('name','')) and
              not re.match(r'^\d{4}年', m.get('name','')) and
              not re.match(r'^\d+$', m.get('name',''))
          )]
          d['medicines'] = clean
          d['total'] = len(clean)
          p.write_text(json.dumps(d, ensure_ascii=False, indent=2))
          print(f'クリーニング完了: {before}件 → {len(clean)}件')
          "

      - name: スクレイピング（タイムアウトしても途中データを保存）
        if: ${{ github.event.inputs.group != 'clean' }}
        run: |
          # スクレイピングをバックグラウンドで実行
          python scraper/pmda_selenium.py \
            --group "${{ github.event.inputs.group || 'hira' }}" \
            --resume &
          SCRAPER_PID=$!

          # 10分ごとにコミット（最大230分）
          for i in $(seq 1 23); do
            sleep 600
            # プロセスが終了していたらループを抜ける
            if ! kill -0 $SCRAPER_PID 2>/dev/null; then
              echo "スクレイパー正常終了"
              break
            fi
            # 中間コミット
            echo "--- 中間コミット $i 回目 ---"
            git pull --rebase 2>/dev/null || true
            git add scraper/medicines.json 2>/dev/null || true
            git diff --staged --quiet || git commit -m "PMDA 中間保存 $i (${{ github.event.inputs.group }})" && git push || true
            COUNT=$(python3 -c "import json; d=json.load(open('scraper/medicines.json')); print(d.get('total',0))" 2>/dev/null || echo "?")
            echo "現在の件数: $COUNT"
          done

          # スクレイパーが終わるまで待つ（最大240分）
          wait $SCRAPER_PID || true
        timeout-minutes: 245

      - name: ゴミデータ自動除去
        if: ${{ github.event.inputs.group != 'clean' }}
        run: |
          python3 -c "
          import json, re
          from pathlib import Path
          p = Path('scraper/medicines.json')
          d = json.loads(p.read_text())
          meds = d.get('medicines', [])
          before = len(meds)
          clean = [m for m in meds if (
              m.get('name','') and
              len(m.get('name','')) >= 2 and
              not re.match(r'^PDF\s*[(\(]', m.get('name','')) and
              not re.match(r'^\d{4}年', m.get('name','')) and
              not re.match(r'^\d+$', m.get('name',''))
          )]
          d['medicines'] = clean
          d['total'] = len(clean)
          p.write_text(json.dumps(d, ensure_ascii=False, indent=2))
          print(f'クリーニング: {before}件 → {len(clean)}件')
          "

      - name: index.html ビルド
        run: python scraper/build.py --output index.html

      - name: 最終コミット＆プッシュ
        run: |
          git pull --rebase 2>/dev/null || true
          git add index.html scraper/medicines.json
          COUNT=$(python3 -c "import json; d=json.load(open('scraper/medicines.json')); print(d.get('total',0))")
          git diff --staged --quiet || git commit -m "PMDA update (${{ github.event.inputs.group }}): ${COUNT}件"
          git push
