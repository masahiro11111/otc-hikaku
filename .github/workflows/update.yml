name: Weekly PMDA Update

on:
  schedule:
    # 毎週日曜 JST 02:00
    - cron: "0 17 * * 6"
  workflow_dispatch:
    inputs:
      group:
        description: "取得グループ (all/hira/kata/alpha/resume)"
        required: false
        default: "all"
        type: choice
        options: ["all","hira","kata","alpha","resume"]

jobs:
  # ── グループ1: ひらがな（あ〜ん）────────────────────
  scrape-hira:
    if: ${{ github.event.inputs.group == 'all' || github.event.inputs.group == 'hira' || github.event_name == 'schedule' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Chrome インストール
        run: |
          wget -q -O - https://dl.google.com/linux/linux_signing_key.pub | sudo apt-key add -
          sudo sh -c 'echo "deb [arch=amd64] http://dl.google.com/linux/chrome/deb/ stable main" >> /etc/apt/sources.list.d/google-chrome.list'
          sudo apt-get update -q && sudo apt-get install -y google-chrome-stable
      - name: 依存インストール
        run: pip install selenium webdriver-manager
      - name: スクレイピング（ひらがな）
        run: python scraper/pmda_selenium.py --group hira --resume
        timeout-minutes: 250
      - name: index.html ビルド
        run: python scraper/build.py --output index.html
      - name: コミット
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase
          git add index.html scraper/medicines.json
          git diff --staged --quiet || git commit -m "PMDA update hira"
          git push

  # ── グループ2: カタカナ（ア〜ン）────────────────────
  scrape-kata:
    if: ${{ github.event.inputs.group == 'all' || github.event.inputs.group == 'kata' || github.event_name == 'schedule' }}
    needs: scrape-hira
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Chrome インストール
        run: |
          wget -q -O - https://dl.google.com/linux/linux_signing_key.pub | sudo apt-key add -
          sudo sh -c 'echo "deb [arch=amd64] http://dl.google.com/linux/chrome/deb/ stable main" >> /etc/apt/sources.list.d/google-chrome.list'
          sudo apt-get update -q && sudo apt-get install -y google-chrome-stable
      - name: 依存インストール
        run: pip install selenium webdriver-manager
      - name: スクレイピング（カタカナ）
        run: python scraper/pmda_selenium.py --group kata --resume
        timeout-minutes: 250
      - name: index.html ビルド
        run: python scraper/build.py --output index.html
      - name: コミット
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase
          git add index.html scraper/medicines.json
          git diff --staged --quiet || git commit -m "PMDA update kata"
          git push

  # ── グループ3: 英字・数字（A〜Z, 0〜9）─────────────
  scrape-alpha:
    if: ${{ github.event.inputs.group == 'all' || github.event.inputs.group == 'alpha' || github.event_name == 'schedule' }}
    needs: scrape-kata
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Chrome インストール
        run: |
          wget -q -O - https://dl.google.com/linux/linux_signing_key.pub | sudo apt-key add -
          sudo sh -c 'echo "deb [arch=amd64] http://dl.google.com/linux/chrome/deb/ stable main" >> /etc/apt/sources.list.d/google-chrome.list'
          sudo apt-get update -q && sudo apt-get install -y google-chrome-stable
      - name: 依存インストール
        run: pip install selenium webdriver-manager
      - name: スクレイピング（英字・数字）
        run: python scraper/pmda_selenium.py --group alpha --resume
        timeout-minutes: 250
      - name: index.html ビルド
        run: python scraper/build.py --output index.html
      - name: コミット
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git pull --rebase
          git add index.html scraper/medicines.json
          git diff --staged --quiet || git commit -m "PMDA update alpha"
          git push
