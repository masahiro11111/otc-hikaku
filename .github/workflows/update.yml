name: Weekly PMDA Update

on:
  schedule:
    # 毎週日曜 JST 02:00（UTC 17:00 土曜）に実行
    - cron: "0 17 * * 6"
  workflow_dispatch:
    # 手動実行ボタン
    inputs:
      limit:
        description: "取得件数上限（0=全件, テスト時は50）"
        required: false
        default: "0"
      resume:
        description: "差分取得モード（既存データを保持）"
        required: false
        default: "true"
        type: choice
        options: ["true", "false"]

jobs:
  scrape-and-build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: チェックアウト
        uses: actions/checkout@v4

      - name: Python 3.11 セットアップ
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Chrome インストール
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      - name: 依存パッケージをインストール
        run: pip install selenium webdriver-manager

      - name: PMDA スクレイピング
        run: |
          LIMIT=${{ github.event.inputs.limit || '0' }}
          RESUME=${{ github.event.inputs.resume || 'true' }}
          if [ "$RESUME" = "true" ]; then
            python scraper/pmda_selenium.py --limit $LIMIT --resume
          else
            python scraper/pmda_selenium.py --limit $LIMIT
          fi
        timeout-minutes: 300   # 最大5時間（全件取得は数時間かかる場合あり）

      - name: index.html をビルド
        run: python scraper/build.py --output index.html

      - name: 変更をコミット＆プッシュ
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add index.html scraper/medicines.json scraper/scraper.log
          git diff --staged --quiet || git commit -m "Weekly update: $(date '+%Y-%m-%d %H:%M JST' --date='+9 hours')"
          git push
